name: Python Unit Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          # Add pytest if you haven't already
          pip install uv

      - name: uv sync
        run: uv sync


      - name: Run pytest
        run: uv run --module pytest -vv
        env: # Inject the variables your mattermost.py expects
          MATTERMOST_URL: "dummy.example.com"
          MATTERMOST_PORT: 443
          MATTERMOST_SCHEME: "https"
          MATTERMOST_TOKEN: "dummy_token"

      - name: mattermost message
        if: always() # Forces step to run even if pytest fails
        run: |
          # Check if it is a PR targeting main OR a direct push to main
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "main" ]]; then
            TEAM_NAME="Collegium"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            TEAM_NAME="Collegium"
          else
            TEAM_NAME="Testing"
          fi
          
          
          if [ "${{ job.status }}" = "success" ]; then
            TEST_PASSED="True"
          else
            TEST_PASSED="False"
          fi
          
          
          SHORT_SHA=$(git rev-parse --short ${{ github.sha }})
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }} | sed 's/"/\\"/g')

          uv run ./tests/success_message.py \
            "${{ secrets.MATTERMOST_URL }}" \
            "${{ secrets.MATTERMOST_TOKEN }}" \
            "$TEAM_NAME" \
            "${{ github.ref_name }}" \
            "${{ github.actor }}" \
            "$SHORT_SHA" \
            "$COMMIT_URL" \
            "$COMMIT_MSG" \
            "${{ github.repository }}" \
            "${{ github.server_url }}" \
            "$TEST_PASSED"