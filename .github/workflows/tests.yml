name: Python Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add pytest if you haven't already
          pip install pytest 
          # If you have a requirements file, uncomment the next line:
          pip install -r requirements.txt

      - name: Run pytest
        # Using pytest is recommended for better reporting
        run: pytest

      - name: try to send Mattermost message
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        run: python3 ./tests/success_message.py ${{ secrets.MATTERMOST_URL }} ${{ secrets.MATTERMOST_TOKEN }} Testing ${{ github.ref_name }} ${{ github.actor }} $(git rev-parse --short ${{ github.sha }}) "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" $(git log -1 --pretty=format:'%s' ${{ github.sha }} | sed 's/"/\\"/g')