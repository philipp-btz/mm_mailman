name: Python Unit Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add pytest if you haven't already
          pip install pytest 
          # If you have a requirements file, uncomment the next line:
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest
        env: # Inject the variables your mattermost.py expects
          MATTERMOST_URL: "dummy.example.com"
          MATTERMOST_PORT: 443
          MATTERMOST_SCHEME: "https"
          MATTERMOST_TOKEN: "dummy_token"

      - name: mattermost message
        if: success() || failure() # Forces step to run even if pytest fails
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TEAM_NAME="Collegium"
          else
            TEAM_NAME="Testing"
          fi
          
          
          if [ "${{ job.status }}" = "success" ]; then
            TEST_PASSED="True"
          else
            TEST_PASSED="False"
          fi
          
          
          SHORT_SHA=$(git rev-parse --short ${{ github.sha }})
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }} | sed 's/"/\\"/g')

          python3 ./tests/success_message.py \
            "${{ secrets.MATTERMOST_URL }}" \
            "${{ secrets.MATTERMOST_TOKEN }}" \
            "Testing" \
            "${{ github.ref_name }}" \
            "${{ github.actor }}" \
            "$SHORT_SHA" \
            "$COMMIT_URL" \
            "$COMMIT_MSG" \
            "${{ github.repository }}" \
            "${{ github.server_url }}" \
            "False"